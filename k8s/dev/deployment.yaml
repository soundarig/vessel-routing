apiVersion: apps/v1
kind: Deployment
metadata:
  name: vessel-routing-client
  namespace: vesops
  labels:
    app: vessel-routing-client
spec:
  replicas: 2
  selector:
    matchLabels:
      app: vessel-routing-client
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0      # zero-downtime rollouts
      maxSurge: 1
  template:
    metadata:
      labels:
        app: vessel-routing-client
    spec:
      terminationGracePeriodSeconds: 60   # allow in-flight WS requests to finish
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: vessel-routing-client
          image: vessel-routing-client:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8300
          env:
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: OAUTH_CLIENT_ID
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: OAUTH_CLIENT_SECRET
            - name: API_USERNAME
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: API_USERNAME
            - name: API_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: API_PASSWORD_HASH
            - name: JWT_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: JWT_SECRET_KEY
            - name: DB_CONNECTION_STRING
              valueFrom:
                secretKeyRef:
                  name: vessel-routing-secrets
                  key: DB_CONNECTION_STRING
            - name: PORT
              value: "8300"
          livenessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8300
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 2
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
