# DO NOT commit real credentials here.
# Populate this with your secret management tool (e.g. Sealed Secrets, External Secrets Operator)
# or apply manually:
#
#   kubectl create secret generic vessel-routing-secrets \
#     --namespace vessops \
#     --from-literal=OAUTH_CLIENT_ID=<your-id> \
#     --from-literal=OAUTH_CLIENT_SECRET=<your-secret>
#
# The placeholder below is intentionally invalid so a misconfigured deploy fails fast.
apiVersion: v1
kind: Secret
metadata:
  name: vessel-routing-secrets
  namespace: vesops
type: Opaque
stringData:
  OAUTH_CLIENT_ID: "REPLACE_ME"
  OAUTH_CLIENT_SECRET: "REPLACE_ME"
  API_USERNAME: "REPLACE_ME"
  API_PASSWORD_HASH: "REPLACE_ME"
