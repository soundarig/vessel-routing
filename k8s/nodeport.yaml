apiVersion: v1
kind: Service
metadata:
  name: vessel-routing-client-external
  namespace: vessel-routing
spec:
  type: NodePort
  selector:
    app: vessel-routing-client
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8300
      nodePort: 30830   # accessible at http://<server-ip>:30800
